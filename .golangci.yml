version: "2"

run:
  timeout: 5m
  tests: true

issues:
  exclusion-rules:
    - text: "(?i)package"
      path: ".+\\.go"
  exclusion-paths:
    - src/external_libs
    - gocat
    - genfiles$
    - vendor$
    - ketama
    - ".*\\.pb\\.go"
    - ".*\\.gen\\.go"
    - ".*_easyjson\\.go"

formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
    - gci
  settings:
    gofmt:
      simplify: true

linters:
  default: none
  enable:
    - asciicheck
    - bodyclose
    - cyclop
    - durationcheck
    - errorlint
    - errname
    - copyloopvar
    - forbidigo
    - gocognit
    - goconst
    - gocyclo
    - godox
    - goheader
    - gomodguard
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - makezero
    - misspell
    - nilerr
    - noctx
    - prealloc
    - predeclared
    - revive
    - staticcheck
    - testpackage
    - thelper
    - tparallel
    - unconvert
    - unparam
    - unused
    - wastedassign
    - whitespace
  settings:
    govet:
      enable:
        - shadow
    gocyclo:
      min-complexity: 10
    gocognit:
      min-complexity: 30
    gocritic:
      disabled-checks:
        - regexpMust
        - ifElseChain
        - elseif
        - unlambda
      enabled-tags:
        - performance
      settings:
        captLocal:
          paramsOnly: true
        rangeValCopy:
          sizeThreshold: 64
    unparam:
      check-exported: false
    godox:
      keywords:
        - OPTIMIZE
        - HACK
    cyclop:
      max-complexity: 15
      skip-tests: false
    gosec:
      includes:
        - G101
        - G102
        - G106
        - G107
        - G108
        - G109
        - G110
        - G306
        - G401
        - G501
        - G502
        - G503
        - G504
        - G505
      excludes:
        - G204
      config:
        G306: "0600"
        G101:
          pattern: "(?i)pwd|password|private_key|secret"
          ignore_entropy: false
          entropy_threshold: "80.0"
          per_char_threshold: "3.0"
          truncate: "32"
    staticcheck:
      checks:
        - "all"
        - "-SA1029"
        - "-SA1019"

output:
  formats:
    colored-line-number:
      path: stdout
